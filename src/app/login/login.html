<div class="login-box">

  <h2>User Login</h2>

  <input
    type="text"
    placeholder="Username"
    [(ngModel)]="username">

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password">

  <button (click)="login()">
    Login
  </button>

  <p class="error">{{error}}</p>

</div>
